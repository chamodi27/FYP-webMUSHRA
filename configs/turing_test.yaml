testname: "Music Generation — Turing Test"
testId: turing_music_eval
bufferSize: 2048
stopOnErrors: true
showButtonPreviousPage: false
remoteService: service/write.php

pages:
  - type: generic
    id: welcome
    name: "Welcome"
    content: >
      <h2>Human or AI?</h2>
      <p>You will hear <strong>10 music clips</strong>. Some are composed by humans,
      some are generated by AI. After each clip, decide:
      <strong>Is this human-composed or AI-generated?</strong></p>
      <p>Trust your instincts. There are no trick questions.</p>

  - type: consent
    id: consent
    name: Consent
    mustConsent: true
    content: "<p>Do you consent to participate?</p>"

  # --- Turing Pages (10 clips, randomized) ---
  - - random

    # AI Clips
    - type: likert_single_stimulus
      id: turing_ai_1
      name: "Human or AI?"
      content: "<p>Listen to the clip, then make your judgement below.</p>"
      showWaveform: false
      mustRate: true
      mustPlayback: ended
      stimuli:
        Audio: configs/audio/turing/ai_clip1.wav
      response:
        - value: human
          label: "Human-composed"
        - value: ai
          label: "AI-generated"

    - type: likert_single_stimulus
