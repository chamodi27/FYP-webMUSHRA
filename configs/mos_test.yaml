testname: "Music Generation — MOS Evaluation"
testId: mos_music_eval
bufferSize: 2048
stopOnErrors: true
showButtonPreviousPage: false
remoteService: service/write.php

pages:
  - type: generic
    id: welcome
    name: "Welcome"
    content: >
      <h2>Listening Test — Mean Opinion Score</h2>
      <p>You will listen to <strong>9 short music clips</strong> one at a time.
      After each clip, rate it on the 5 qualities listed using a 1–5 scale.</p>
      <p><em>General listeners: please rate only questions 1–3.<br>
      Expert listeners: please rate all 5 questions.</em></p>
      <p>Use headphones if possible. Please do not take breaks mid-test.</p>
      <hr>
      <p><strong>Criteria:</strong></p>
      <ol>
        <li><strong>Structural coherence</strong> — <em>“The piece feels organized and coherent over time.”</em></li>
        <li><strong>Musical flow</strong> — <em>“The music progresses naturally.”</em></li>
        <li><strong>Overall musical quality</strong> — <em>“Overall, this is a good musical composition.”</em></li>
        <li><strong>[Experts] Motivic consistency</strong> — <em>“The piece repeats and develops musical ideas in a consistent way.”</em></li>
        <li><strong>[Experts] Harmonic coherence</strong> — <em>“The chord progression sounds natural and makes musical sense.”</em></li>
      </ol>

  - type: consent
    id: consent
    name: Consent
    mustConsent: true
    content: >
      <p>Your responses are collected anonymously for academic research.
      Do you consent to participate?</p>

  - type: volume
    id: vol_check
    name: Volume Check
    content: "Please adjust your headphone/speaker volume to a comfortable level using the clip below."
    stimulus: configs/audio/mos/xlstm/clip1.wav
    defaultVolume: 0.8

  # --- MOS Pages (9 clips, randomized) ---
  - - random
    
    # xLSTM
    - type: likert_single_stimulus
      id: mos_xlstm_1
      name: "Clip 1 Rating"
      content: "<p>Listen to the clip fully, then give your <strong>Overall Musical Quality</strong> rating (and mark specific sub-criteria on your questionnaire sheet).</p>"
      showWaveform: false
      mustRate: true
      mustPlayback: ended
      stimuli:
        Audio: configs/audio/mos/xlstm/clip1.wav
      response:
        - value: "1"; label: "1 – Very Poor"
        - value: "2"; label: "2 – Poor"
        - value: "3"; label: "3 – Fair"
        - value: "4"; label: "4 – Good"
        - value: "5"; label: "5 – Excellent"

    - type: likert_single_stimulus
      id: mos_xlstm_2
      name: "Clip 2 Rating"
