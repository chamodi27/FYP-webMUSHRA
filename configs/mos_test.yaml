  - type: finish
    name: "Thank You"
    content: "Thank you for completing the MOS test! Please fill in the details below and click <strong>Send</strong>."
    showResults: false
    writeResults: true
    popupContent: >
      <p style="font-size:1.1em;">✅ Your MOS results have been saved!</p>
      <p>Please continue to the <strong>A/B Comparison Test</strong> (Part 2 of 3).</p>
      <p><em>Use the same Participant ID for all tests.</em></p>
      <p style="margin-top:1em;">
        <a href="?config=ab_test.yaml"
           data-role="button" data-inline="true" data-theme="b"
           style="font-size:1.1em;">
          Continue to A/B Test →
        </a>
      </p>
    questionnaire:
      - type: text
        label: Participant ID (if provided)
        name: participant_id
      - type: number
        label: Age
        name: age
        min: 16
        max: 80
        default: 25
      - type: likert
        name: music_background
        label: "Musical background"
        response:
          - value: novice
            label: "Novice (casual listener)"
          - value: intermediate
            label: "Intermediate (some training)"
          - value: expert
            label: "Expert (formal music education)"
