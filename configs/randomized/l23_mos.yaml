testname: MOS Test — Listener 23 (Non-Expert)
testId: mos_l23
bufferSize: 4096
stopOnErrors: true
showButtonPreviousPage: true
remoteService: service/write.php
pages:
- type: generic
  id: welcome
  name: Welcome
  content: "<p>This test has <strong>9 clips</strong>. Listen to each clip fully, then rate it on <strong>3 criteria</strong> using a 1–5 scale.</p><p><strong>Criteria:</strong></p><ol><li><strong>Structural Coherence</strong> — <em>The piece feels organized and coherent over time.</em></li><li><strong>Musical Flow</strong> — <em>The music progresses naturally.</em></li><li><strong>Overall Musical Quality</strong> — <em>Overall, this is a good musical composition.</em></li></ol><p><strong>Wear headphones.</strong></p>"
- type: consent
  id: consent
  name: Consent
  mustConsent: true
  content: >
    <ol>
      <li>I have understood the information about the project, and the researchers have explained it to me.</li>
      <li>I understand that my responses will be recorded anonymously.</li>
      <li>I understand that my participation is voluntary.</li>
      <li>I understand that I will not have any personal benefit from the research, but it would benefit the research community.</li>
      <li>I understand that I am free to contact any of the people involved in the research to seek further clarification and information.</li>
      <li>I have the right to withdraw the data I have provided at any time, to the extent that they have not been used in any publication at the time of withdrawal.</li>
    </ol>
